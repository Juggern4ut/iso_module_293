<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musterlösung Aufgabenblatt 12 - HTML Formulare II</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Kursfeedback Web-Grundlagen</h1>
    <p>Teile uns mit, wie du den Kurs erlebt hast.</p>

    <form action="/feedback" method="post">
      <label for="modul">Thema</label>
      <select id="modul" name="modul">
        <option>HTML</option>
        <option>CSS</option>
        <option>Flexbox</option>
        <option>Formulare</option>
      </select>

      <div class="field">
        <legend>Tempo</legend>
        <label><input type="radio" name="tempo" value="langsam" /> Langsam</label>
        <label><input type="radio" name="tempo" value="passend" /> Passend</label>
        <label><input type="radio" name="tempo" value="schnell" /> Schnell</label>
      </div>

      <div class="field">
        <legend>Zusatzwünsche</legend>
        <label><input type="checkbox" name="wuensche" value="handout" /> Handout</label>
        <label><input type="checkbox" name="wuensche" value="beispiele" /> Mehr Beispiele</label>
        <label><input type="checkbox" name="wuensche" value="uebungen" /> Mehr Übungen</label>
      </div>

      <label for="kommentar">Kommentar</label>
      <textarea id="kommentar" name="kommentar" rows="6"></textarea>

      <button type="submit">Feedback senden</button>
    </form>
  </main>
</body>
</html>
