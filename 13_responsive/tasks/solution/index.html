<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
<style>

    *{
        margin: 0;
        padding: 0;
    }

    .container{
        width: 90%;
        margin: 0 auto;
        background-color: #dedede;
        padding: 20px;
    }

    .left, .right {
        width: calc(50% - 4px);
        border: 1px solid #000;
        display: inline-block;
        padding: 10px;
        box-sizing: border-box;
    }

    @media(max-width: 700px){
        .left, .right {
            width: 100%;
            display: block;
        }
        .right {
            margin-top: 10px; 
        }
    }
</style>
    </head>
    <body>
        <section class="container">
            <div class="left">Links</div>
            <div class="right">Rechts</div>
        </section>    
    </body>
</html>
